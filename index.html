<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News App</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <nav class="nav">
    <a href="#" onclick="reload()" class="logo-link">
      <img src="Frame 777.png" alt="News App Logo" class="logo" />
    </a>

    <ul class="nav-links">
      <li class="na" id="ipl" onclick="onNavItemClick('ipl')">IPL</li>
      <li class="na" id="world" onclick="onNavItemClick('world')">World</li>
      <li class="na" id="business" onclick="onNavItemClick('business')">Business</li>
      <li class="na" id="politics" onclick="onNavItemClick('politics')">Politics</li>
    </ul>

    <div class="search-container">
      <input type="text" class="search-input" id="search-text" placeholder="Search news..."/>
      <button class="search-button" id="search-button">Search</button>
    </div>
  </nav>

  <main>
    <div class="news-container" id="cards-container"></div>
  </main>

  <template id="template-news-card">
    <div class="card">
      <img class="news-image" id="thumbnail" src="" alt="News thumbnail" />

      <div class="card-content">
        <h3 class="news-title" id="news-title"></h3>
        <p class="news-source" id="news-source"></p>
        <p class="news-description" id="news-description"></p>
        <a class="read-more" id="news-url" href="#" target="_blank">
          Read full article →
        </a>
      </div>
    </div>
  </template>

  <script src="script.js"></script>

</body>
</html>
